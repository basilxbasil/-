<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دورها - سوق الخردة وإعادة التدوير</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; }
        .category-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-start">
    <div class="w-full max-w-md bg-white min-h-screen shadow-lg relative pb-24 flex flex-col">
        
        <div class="p-4 flex justify-between items-center bg-white border-b border-gray-100">
            <button class="p-2 text-gray-500 hover:bg-gray-100 rounded-full"><i class="fa-regular fa-bell text-xl"></i></button>
            <div class="text-right">
                <h1 class="text-lg font-bold text-gray-900">دورها</h1>
            </div>
            <div class="w-10 h-10 bg-[#e04f26] text-white rounded-full flex items-center justify-center font-black text-xl shadow-md">د</div>
        </div>

        <div class="p-4 space-y-5 flex-1 overflow-y-auto">
            
            <div class="space-y-3">
                <h3 class="text-sm font-bold text-gray-800">الأقسام</h3>
                <div class="grid grid-cols-4 gap-3 text-center">
                    
                    <button class="category-btn flex flex-col items-center space-y-1 group">
                        <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center shadow-sm group-hover:border-[#e04f26] transition">
                            <i class="fa-solid fa-magnet text-xl text-gray-500 group-hover:text-[#e04f26]"></i>
                        </div>
                        <span class="text-[11px] font-medium text-gray-600">معادن</span>
                    </button>

                    <button class="category-btn flex flex-col items-center space-y-1 group">
                        <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center shadow-sm group-hover:border-[#e04f26] transition">
                            <i class="fa-solid fa-laptop text-xl text-gray-500 group-hover:text-[#e04f26]"></i>
                        </div>
                        <span class="text-[11px] font-medium text-gray-600">إلكترونيات</span>
                    </button>

                    <button class="category-btn flex flex-col items-center space-y-1 group">
                        <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center shadow-sm group-hover:border-[#e04f26] transition">
                            <i class="fa-solid fa-couch text-xl text-gray-500 group-hover:text-[#e04f26]"></i>
                        </div>
                        <span class="text-[11px] font-medium text-gray-600">أثاث</span>
                    </button>

                    <button class="category-btn flex flex-col items-center space-y-1 group">
                        <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center shadow-sm group-hover:border-[#e04f26] transition">
                            <i class="fa-solid fa-blender text-xl text-gray-500 group-hover:text-[#e04f26]"></i>
                        </div>
                        <span class="text-[11px] font-medium text-gray-600">أجهزة</span>
                    </button>
                </div>
            </div>
            
        </div>
    </div>
</body>
</html>
