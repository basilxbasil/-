<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دورها - سوق الخردة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .nav-link { transition: all 0.3s ease; }
        .nav-link:active { transform: translateY(2px); }
    </style>
</head>
<body class="bg-gray-100 flex justify-center min-h-screen">
    <div class="w-full max-w-md bg-white shadow-2xl min-h-screen flex flex-col relative overflow-hidden">
        
        <!-- Header -->
        <header class="p-4 border-b flex justify-between items-center bg-white">
            <div class="w-10 h-10 bg-[#e04f26] rounded-full flex items-center justify-center text-white font-bold shadow-lg">د</div>
            <h1 class="font-black text-lg">دورها</h1>
            <button><i class="fa-solid fa-bell text-gray-500"></i></button>
        </header>

        <!-- Main Content -->
        <main class="flex-1 p-4 space-y-6">
            <!-- Search -->
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute right-4 top-4 text-gray-400"></i>
                <input type="text" placeholder="ابحث عن خردة، أجهزة..." class="w-full bg-gray-50 p-3 pr-12 rounded-2xl outline-none border border-gray-100">
            </div>

            <!-- Categories Grid (Inspired by Emergent) -->
            <div class="grid grid-cols-4 gap-4">
                <button class="nav-link flex flex-col items-center gap-2">
                    <div class="w-14 h-14 bg-orange-50 rounded-2xl flex items-center justify-center text-[#e04f26] text-xl"><i class="fa-solid fa-magnet"></i></div>
                    <span class="text-[10px] font-bold">معادن</span>
                </button>
                <button class="nav-link flex flex-col items-center gap-2">
                    <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 text-xl"><i class="fa-solid fa-laptop"></i></div>
                    <span class="text-[10px] font-bold">إلكترونيات</span>
                </button>
                <button class="nav-link flex flex-col items-center gap-2">
                    <div class="w-14 h-14 bg-green-50 rounded-2xl flex items-center justify-center text-green-600 text-xl"><i class="fa-solid fa-couch"></i></div>
                    <span class="text-[10px] font-bold">أثاث</span>
                </button>
                <button class="nav-link flex flex-col items-center gap-2">
                    <div class="w-14 h-14 bg-purple-50 rounded-2xl flex items-center justify-center text-purple-600 text-xl"><i class="fa-solid fa-snowflake"></i></div>
                    <span class="text-[10px] font-bold">مكيفات</span>
                </button>
            </div>
        </main>

        <!-- Navigation Bar (Emergent Style) -->
        <footer class="p-4 border-t flex justify-between items-center bg-white pb-6">
            <button class="nav-link text-gray-400 flex flex-col items-center"><i class="fa-solid fa-house text-xl text-[#e04f26]"></i><span class="text-[10px] font-bold mt-1">الرئيسية</span></button>
            <button class="nav-link text-gray-400 flex flex-col items-center"><i class="fa-solid fa-magnifying-glass text-xl"></i><span class="text-[10px] font-bold mt-1">بحث</span></button>
            <button class="bg-[#e04f26] text-white w-14 h-14 rounded-full shadow-lg -mt-10 border-4 border-white"><i class="fa-solid fa-plus text-xl"></i></button>
            <button class="nav-link text-gray-400 flex flex-col items-center"><i class="fa-solid fa-comments text-xl"></i><span class="text-[10px] font-bold mt-1">المحادثات</span></button>
            <button class="nav-link text-gray-400 flex flex-col items-center"><i class="fa-solid fa-user text-xl"></i><span class="text-[10px] font-bold mt-1">حسابي</span></button>
        </footer>
    </div>
</body>
</html>
