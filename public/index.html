<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دورها - سوق الخردة وإعادة التدوير</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-start">
    <div class="w-full max-w-md bg-white min-h-screen shadow-lg relative pb-24 flex flex-col">
        
        <!-- الهيدر العلوي -->
        <div class="p-4 flex justify-between items-center bg-white border-b border-gray-100">
            <button class="p-2 text-gray-500 hover:bg-gray-100 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
            </button>
            <div class="flex items-center space-x-3 space-x-reverse">
                <div class="text-right">
                    <h1 class="text-lg font-bold text-gray-900">دورها</h1>
                    <p class="text-xs text-gray-500">سوق الخردة وإعادة التدوير</p>
                </div>
                <div class="w-10 h-10 bg-[#e04f26] text-white rounded-full flex items-center justify-center font-black text-xl shadow-md">د</div>
            </div>
        </div>

        <!-- محتوى الصفحة -->
        <div class="p-4 space-y-5 flex-1 overflow-y-auto">
            <!-- شريط البحث -->
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </span>
                <input type="text" placeholder="ابحث عن مكيف، حديد، أثاث..." class="w-full pl-10 pr-4 py-3 bg-gray-50 text-gray-800 rounded-xl focus:outline-none ring-1 ring-gray-200 text-sm font-medium">
            </div>

            <!-- البانر الإعلاني الكبير -->
            <div class="bg-[#12322b] rounded-2xl p-5 text-white shadow-sm relative overflow-hidden text-center">
                <h2 class="text-xl font-bold mb-1">حوّل خردتك إلى دخل</h2>
                <p class="text-xs text-gray-200 mb-4 font-light">بع الأجهزة القديمة، المعادن، الأثاث – بكل سهولة.</p>
                <button class="bg-[#e04f26] text-white text-xs font-bold py-2.5 px-6 rounded-xl shadow transition transform active:scale-95">أضف إعلانك الآن</button>
            </div>

            <!-- شبكة الأقسام -->
            <div class="space-y-3">
                <h3 class="text-sm font-bold text-gray-800">الأقسام</h3>
                <div class="grid grid-cols-4 gap-3 text-center">
                    
                    <!-- خردة معادن: مغناطيس -->
                    <div class="flex flex-col items-center space-y-1">
                        <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center text-gray-700 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 7v4a6 6 0 0012 0V7M6 7H3v4a9 9 0 0018 0V7h-3M6 7h3v3a3 3 0 006 0V7h3" />
                            </svg>
                        </div>
                        <span class="text-[11px] font-medium text-gray-600">خردة معادن</span>
                    </div>

                    <!-- إلكترونيات: شاشة / تلفزيون ذكي -->
                    <div class="flex flex-col items-center space-y-1">
                        <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center text-gray-700 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <rect x="2" y="3" width="20" height="14" rx="2" stroke-width="2"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 21h8M12 17v4"/>
                            </svg>
                        </div>
                        <span class="text-[11px] font-medium text-gray-600">إلكترونيات</span>
                    </div>

                    <!-- أثاث: كرسي / كنبة -->
                    <div class="flex flex-col items-center space-y-1">
                        <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center text-gray-700 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 10v10M7 10h10M7 6c0-1 1-2 2-2h6c1 0 2 1 2 2v4H7V6z" />
                            </svg>
                        </div>
                        <span class="text-[11px] font-medium text-gray-600">أثاث</span>
                    </div>

                    <!-- أجهزة منزلية: غسالة فل أوتوماتيك -->
                    <div class="flex flex-col items-center space-y-1">
                        <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center text-gray-700 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <rect x="4" y="3" width="16" height="18" rx="2" stroke-width="2"/>
                                <circle cx="12" cy="13" r="4" stroke-width="2"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 6h2M15 6h2"/>
                            </svg>
                        </div>
                        <span class="text-[11px] font-medium text-gray-600">أجهزة منزلية</span>
                    </div>

                    <!-- مكيفات: سبليت يخرج هواء تبريد -->
                    <div class="flex flex-col items-center space-y-1">
                        <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center text-gray-700 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <rect x="3" y="4" width="18" height="8" rx="1" stroke-width="2"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 16l-1 2M10 16l-1 2M14 16l-1 2M18 16l-1 2M7 8h10"/>
                            </svg>
                        </div>
                        <span class="text-[11px] font-medium text-gray-600">مكيفات</span>
                    </div>

                    <!-- بلاستيك: زجاجة إعادة تدوير البلاستيك -->
                    <div class="flex flex-col items-center space-y-1">
                        <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center text-gray-700 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3h6M10 3v3h4V3M7 9c0-2 2-3 5-3s5 1 5 3v10a2 2 0 01-2 2H9a2 2 0 01-2-2V9zM7 13h10M7 17h10" />
                            </svg>
                        </div>
                        <span class="text-[11px] font-medium text-gray-600">بلاستيك</span>
                    </div>

                    <!-- قطع سيارات: دريكسون / مقود سيارة -->
                    <div class="flex flex-col items-center space-y-1">
                        <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center text-gray-700 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <circle cx="12" cy="12" r="9" stroke-width="2"/>
                                <circle cx="12" cy="12" r="2" stroke-width="2"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v8M12 14v8M2 12h10M14 12h8"/>
                            </svg>
                        </div>
                        <span class="text-[11px] font-medium text-gray-600">قطع سيارات</span>
                    </div>

                    <!-- خدمات نقل: شاحنة توصيل ونقل بضائع -->
                    <div class="flex flex-col items-center space-y-1">
                        <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center text-gray-700 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8h11v9H3V8zM14 10h4l3 3v4h-7v-7z" />
                                <circle cx="6" cy="17" r="2" stroke-width="2"/>
                                <circle cx="16" cy="17" r="2" stroke-width="2"/>
                            </svg>
                        </div>
                        <span class="text-[11px] font-medium text-gray-600">خدمات نقل</span>
                    </div>
                </div>

                <!-- أخرى: أيقونة المربعات الأربعة (قائمة تصنيفات) -->
                <div class="flex justify-start pt-1">
                    <div class="flex flex-col items-center space-y-1">
                        <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center text-gray-700 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                            </svg>
                        </div>
                        <span class="text-[11px] font-medium text-gray-600">أخرى</span>
                    </div>
                </div>
            </div>

            <!-- عنوان أحدث الإعلانات -->
            <div class="pt-2 flex justify-between items-center">
                <h3 class="text-sm font-bold text-gray-800">أحدث الإعلانات</h3>
                <button class="text-xs text-[#e04f26] font-bold">عرض الكل</button>
            </div>
        </div>

        <!-- شريط التنقل السفلي الثابت -->
        <nav class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-4 py-2 flex justify-between items-center z-50 shadow-[0_-4px_10px_rgba(0,0,0,0.02)]">
            <button class="flex flex-col items-center text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg><span class="text-[10px] font-medium">حسابي</span></button>
            <button class="flex flex-col items-center text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg><span class="text-[10px] font-medium">المحادثات</span></button>
            <div class="relative -top-5"><button class="w-12 h-12 bg-[#e04f26] rounded-full flex items-center justify-center text-white font-bold text-2xl shadow-lg">+</button></div>
            <button class="flex flex-col items-center text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg><span class="text-[10px] font-medium">بحث</span></button>
            <button class="flex flex-col items-center text-[#e04f26]"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" /></svg><span class="text-[10px] font-bold">الرئيسية</span></button>
        </nav>
    </div>
</body>
</html>
