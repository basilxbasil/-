name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install and Build
        run: |
          npm install
          # هذا السطر سيقوم بالبناء مع التأكيد على المسار
          npm run build
          
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # هذا المجلد هو المكان الذي تخرج فيه ملفات React بعد البناء
          path: 'build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
